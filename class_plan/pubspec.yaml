name: class_plan
description: "课程表应用 - 读取PDF/图片/手动录入课表，生成学期课程安排"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # === 核心依赖 ===
  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 依赖注入
  get_it: ^8.0.3

  # 本地数据库
  sqflite: ^2.4.2
  path: ^1.9.1

  # 文件处理
  file_picker: ^9.2.0
  path_provider: ^2.1.5

  # PDF 解析
  syncfusion_flutter_pdf: ^28.2.5

  # OCR（文字识别）
  google_mlkit_text_recognition: ^0.14.0

  # 日期时间
  intl: ^0.20.2

  # 唯一ID生成
  uuid: ^4.5.1

  # 跨平台网络（用于AI解析）
  http: ^1.3.0

  # JSON序列化
  json_annotation: ^4.9.0

  # 共享偏好（存储设置）
  shared_preferences: ^2.3.5

  # 分享
  share_plus: ^10.1.4

  # 本地通知（课程提醒）
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
